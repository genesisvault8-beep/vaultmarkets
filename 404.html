<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultMarkets — 404</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2304080f'/><text y='72' x='10' font-size='72'>📈</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04080f;
  --panel: #080f1c;
  --border: rgba(0,229,255,0.1);
  --cyan: #00e5ff;
  --green: #00ff88;
  --red: #ff3355;
  --text: #b0c8d8;
  --muted: #3a5060;
  --dim: #1a2a3a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
  overflow: hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.018) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events:none;
}
.box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 48px 36px;
  max-width: 480px;
  width: 100%;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.5s ease;
}
.box::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--red), transparent);
}
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.error-code {
  font-family: 'Orbitron', monospace;
  font-size: 96px;
  font-weight: 900;
  color: var(--red);
  line-height: 1;
  text-shadow: 0 0 40px rgba(255,51,85,0.3);
  margin-bottom: 8px;
}
.error-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 4px;
  margin-bottom: 20px;
}
.error-title {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.error-desc {
  font-size: 15px;
  color: var(--text);
  opacity: 0.7;
  line-height: 1.6;
  margin-bottom: 32px;
}
.btn-home {
  display: inline-block;
  padding: 14px 32px;
  background: var(--cyan);
  color: #000;
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-decoration: none;
  border-radius: 3px;
  transition: all 0.3s;
  margin-right: 10px;
  margin-bottom: 10px;
}
.btn-home:hover { background: #fff; box-shadow: 0 0 20px rgba(0,229,255,0.3); }
.btn-dash {
  display: inline-block;
  padding: 14px 32px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-decoration: none;
  border-radius: 3px;
  transition: all 0.3s;
  margin-bottom: 10px;
}
.btn-dash:hover { border-color: var(--cyan); color: var(--cyan); }
.logo {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  font-weight: 900;
  color: var(--muted);
  letter-spacing: 2px;
  margin-top: 28px;
  text-decoration: none;
}
.logo span { color: var(--cyan); opacity: 0.5; }
.countdown {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-top: 16px;
}
.countdown span { color: var(--cyan); }
</style>
</head>
<body>
<div class="box">
  <div class="error-code">404</div>
  <div class="error-tag">// PAGE NOT FOUND</div>
  <div class="error-title">SIGNAL LOST</div>
  <div class="error-desc">The page you're looking for doesn't exist or has been moved. Head back to the platform.</div>
  <div>
    <a href="index.html" class="btn-home">← HOME</a>
    <a href="vaultmarkets-access.html" class="btn-dash">ENTER ACCESS CODE</a>
  </div>
  <div class="countdown">// AUTO-REDIRECTING IN <span id="count">10</span>s</div>
  <a href="index.html" class="logo">VAULT<span>MARKETS</span></a>
</div>

<script>
let n = 10;
const el = document.getElementById('count');
const t = setInterval(() => {
  n--;
  el.textContent = n;
  if (n <= 0) { clearInterval(t); window.location.href = 'index.html'; }
}, 1000);
</script>
</body>
</html>
